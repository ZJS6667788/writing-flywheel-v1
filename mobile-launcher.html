<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写作飞轮</title>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151e;
    --card: #181c28;
    --card-hover: #1e2234;
    --border: #252a3a;
    --border-light: #2e3348;
    --accent: #7c6af7;
    --accent-light: #9580ff;
    --accent-glow: rgba(124, 106, 247, 0.2);
    --blue: #4da6ff;
    --blue-light: #70bbff;
    --gold: #f7c76a;
    --green: #6af7a5;
    --text: #e8eaf0;
    --text-secondary: #a0a8c0;
    --muted: #5c6280;
    --danger: #f76a6a;
    --success: #6af7a5;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
    overflow-x: hidden;
  }

  /* ── 顶部状态栏 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 80%, transparent 100%);
    padding: 16px 16px 24px;
  }
  .top-bar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #5e6af7);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(124,106,247,0.3);
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .sync-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--muted);
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .sync-badge.ok .sync-dot { background: var(--success); }
  .sync-badge.ok .sync-time { color: var(--success); }

  /* ── 场景指示器 ── */
  .scene-nav {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
  }
  .scene-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
  }
  .scene-btn.active {
    background: var(--card-hover);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .scene-icon { font-size: 24px; line-height: 1; }
  .scene-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .scene-desc { font-size: 10px; color: var(--muted); text-align: center; }
  .scene-btn.active .scene-name { color: var(--accent-light); }

  /* ── 操作面板 ── */
  .panel { display: none; padding: 0 16px 24px; }
  .panel.active { display: block; }

  /* 场景1：拆解入库 */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: border-color 0.2s;
  }
  .input-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .input-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .input-label-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .cmd-input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    min-height: 48px;
  }
  .cmd-input::placeholder { color: var(--muted); }
  .paste-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .paste-btn:active { transform: scale(0.95); opacity: 0.9; }

  /* 命令预览 */
  .cmd-preview {
    display: none;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 12px;
  }
  .cmd-preview.show { display: block; }
  .cmd-preview-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .cmd-preview-text {
    font-size: 13px;
    color: var(--blue-light);
    font-family: "SF Mono","Menlo",monospace;
    word-break: break-all;
    line-height: 1.6;
  }

  /* 主按钮 */
  .main-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #5e6af7);
    border: none;
    border-radius: var(--radius);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(124,106,247,0.3);
  }
  .main-btn:active { transform: scale(0.98); }
  .main-btn:disabled {
    background: var(--card-hover);
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .main-btn.success {
    background: linear-gradient(135deg, var(--green), #4ad68a);
    box-shadow: 0 4px 16px rgba(106,247,165,0.3);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--success);
    color: var(--success);
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.fail { border-color: var(--danger); color: var(--danger); }

  /* ── 场景2：灵感写作 ── */
  .write-flow {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* 步骤卡片 */
  .step-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: all 0.2s;
  }
  .step-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .step-card.done {
    border-color: var(--green);
    background: rgba(106,247,165,0.03);
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent-glow);
    color: var(--accent-light);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-card.done .step-num {
    background: rgba(106,247,165,0.2);
    color: var(--green);
  }
  .step-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .step-desc {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* 主题输入 */
  .theme-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    margin-bottom: 12px;
  }
  .theme-input:focus {
    border-color: var(--accent);
  }

  /* 推荐创意列表 */
  .recommend-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }
  .recommend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
  }
  .recommend-item:hover { background: var(--card-hover); }
  .recommend-item.selected {
    border-color: var(--green);
    background: rgba(106,247,165,0.05);
  }
  .recommend-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .recommend-item.selected .recommend-check {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
    font-size: 12px;
  }
  .recommend-info { flex: 1; min-width: 0; }
  .recommend-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .recommend-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .recommend-priority {
    font-size: 12px;
    color: var(--gold);
    flex-shrink: 0;
  }

  /* 标题输入 */
  .title-input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .title-input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  .title-input:focus { border-color: var(--gold); }
  .title-input::placeholder { color: var(--muted); }

  /* 写作命令预览 */
  .write-preview {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--gold);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .write-preview-label {
    font-size: 10px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .write-preview-content {
    font-size: 13px;
    color: var(--blue-light);
    font-family: monospace;
    line-height: 1.6;
    word-break: break-all;
  }
  .write-preview-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── 统计数据 ── */
  .stats-row {
    display: flex;
    gap: 10px;
    padding: 0 16px 20px;
  }
  .stat-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stat-card:active { transform: scale(0.97); border-color: var(--border-light); }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-num.v1 { color: var(--accent); }
  .stat-num.v2 { color: var(--blue); }
  .stat-num.v3 { color: var(--gold); }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.3px;
  }

  /* ── 内容区块 ── */
  .section {
    padding: 0 16px 24px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-badge {
    font-size: 11px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ── 素材卡片 ── */
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .entry-card:active { transform: scale(0.99); }
  .entry-card.expanded { border-color: var(--border-light); }
  .entry-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    cursor: pointer;
  }
  .entry-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    font-family: monospace;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  .entry-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .entry-card.expanded .entry-arrow { transform: rotate(180deg); }

  .entry-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0 14px;
    background: rgba(0,0,0,0.2);
  }
  .entry-card.expanded .entry-detail { display: block; }
  .entry-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .entry-section:last-child { border-bottom: none; }
  .entry-section-title {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .entry-structure {
    background: rgba(77, 166, 255, 0.08);
    border: 1px solid rgba(77, 166, 255, 0.2);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--blue-light);
    font-family: monospace;
    line-height: 1.5;
  }
  .entry-quotes { display: flex; flex-direction: column; gap: 6px; }
  .entry-quote {
    font-size: 12px;
    color: var(--gold);
    background: rgba(247, 199, 106, 0.06);
    border-left: 2px solid rgba(247, 199, 106, 0.4);
    padding: 6px 10px;
    border-radius: 0 6px 6px 0;
    line-height: 1.5;
  }
  .entry-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .entry-tag {
    font-size: 11px;
    background: var(--accent-glow);
    color: var(--accent-light);
    border: 1px solid rgba(124,106,247,0.2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .entry-actions {
    display: flex;
    gap: 8px;
    padding: 12px 0;
  }
  .entry-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    background: none;
  }
  .entry-btn:active { transform: scale(0.96); }
  .entry-btn-copy {
    background: var(--accent-glow);
    border-color: rgba(124,106,247,0.3);
    color: var(--accent-light);
  }
  .entry-btn-link {
    background: rgba(77,166,255,0.1);
    border-color: rgba(77,166,255,0.3);
    color: var(--blue-light);
  }

  /* ── 创意方向 ── */
  .idea-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .idea-card.priority-high { border-color: rgba(247,106,106,0.3); }
  .idea-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    cursor: pointer;
  }
  .idea-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--blue);
    background: rgba(77,166,255,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    font-family: monospace;
  }
  .idea-priority {
    font-size: 10px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .idea-info { flex: 1; min-width: 0; }
  .idea-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .idea-source {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .idea-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .idea-card.expanded .idea-arrow { transform: rotate(180deg); }

  .idea-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0 14px;
    background: rgba(0,0,0,0.15);
  }
  .idea-card.expanded .idea-detail { display: block; }
  .idea-angle {
    background: rgba(77,166,255,0.07);
    border: 1px solid rgba(77,166,255,0.15);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    color: var(--blue-light);
    line-height: 1.6;
    margin: 12px 0;
  }
  .idea-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .idea-row:last-child { border-bottom: none; }
  .idea-row-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .idea-row-value {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }
  .idea-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .idea-tag {
    font-size: 11px;
    background: rgba(124,106,247,0.08);
    color: var(--accent-light);
    border: 1px solid rgba(124,106,247,0.2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .idea-actions {
    display: flex;
    gap: 8px;
    padding: 12px 0;
  }
  .idea-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    background: none;
  }
  .idea-btn:active { transform: scale(0.96); }
  .idea-btn-write {
    background: rgba(106,247,165,0.1);
    border-color: rgba(106,247,165,0.3);
    color: var(--success);
  }
  .idea-btn-copy {
    background: rgba(124,106,247,0.08);
    border-color: rgba(124,106,247,0.25);
    color: var(--accent-light);
  }

  /* ── 完稿卡片 ── */
  .draft-card {
    background: var(--card);
    border: 1px solid rgba(247,199,106,0.25);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .draft-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    cursor: pointer;
  }
  .draft-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    background: rgba(247,199,106,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    font-family: monospace;
  }
  .draft-info { flex: 1; min-width: 0; }
  .draft-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

function switchScene(btn) {

function pasteAnalyze() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(function(text) {
      document.getElementById('analyze-input').value = text;
      updateAnalyzePreview();
    }).catch(function() {
      showToast('请长按输入框选择「粘贴」', true);
    });
  }
}

function updateAnalyzePreview() {
  var val = document.getElementById('analyze-input').value.trim();
  var preview = document.getElementById('analyze-preview');
  var previewText = document.getElementById('analyze-preview-text');
  var btn = document.getElementById('analyze-btn');
  
  if (val) {
    previewText.textContent = '/CONTENT-GOLDMINE\n' + val;
    preview.classList.add('show');
    btn.disabled = false;
  } else {
    preview.classList.remove('show');
    btn.disabled = true;
  }
}

function copyAnalyzeCmd() {
  var val = document.getElementById('analyze-input').value.trim();

  showToast('✓ 已复制！去 WorkBuddy 粘贴发送');
}

// ══ 场景2：灵感写作 ══
function onThemeInput() {
  var theme = document.getElementById('theme-input').value.trim();
  currentTheme = theme;
  
  // 显示推荐区域
  var recommendSection = document.getElementById('recommend-section');
  
  if (theme.length >= 2) {
    recommendSection.style.display = 'block';
    
    // 根据主题关键词匹配创意
    var matchedIdeas = matchIdeas(theme);
    renderRecommendations(matchedIdeas);
    
    // 更新步骤2
    updateStepState(2);
  } else {
    recommendSection.style.display = 'none';
    resetWriteFlow();
  }
  
  updateWritePreview();
}

function matchIdeas(theme) {
  // 关键词匹配
  var keywords = theme.toLowerCase();
  var matched = [];
  
  // 主题关键词映射
  var themeMap = {
    '职场': ['职场', '工作', '上班', '老板', '同事', '辞职', '加班'],
    '买房': ['买房', '房子', '购房', '房价', '公积金', '贷款', '选房', '汕尾'],
    '返乡': ['返乡', '回家', '汕尾', '小镇', '家乡', '故乡'],
    '中年': ['中年', '35岁', '40岁', '危机'],
    '爱情': ['爱情', '感情', '单身', '相亲', '结婚'],
    '努力': ['努力', '躺平', '奋斗', '内卷', '摆烂'],
    '科学': ['熵', '机会成本', '科学', '概念'],
    '政策': ['政策', '救市', '公积金', '广州', '楼市'],
    '避坑': ['避坑', '坑', '陷阱', '骗', '踩坑']
  };
  
  // 检查匹配的分类
  var matchedCategories = [];
  for (var cat in themeMap) {
    for (var kw of themeMap[cat]) {
      if (keywords.includes(kw)) {
        matchedCategories.push(cat);
        break;
      }
    }
  }
  
  // 匹配创意
  for (var idea of ideas) {
    var score = 0;
    var ideaText = (idea.title + ' ' + idea.angle + ' ' + idea.tags.join(' ')).toLowerCase();
    
    // 标题直接包含主题词
    if (ideaText.includes(keywords)) {
      score += 10;
    }
    
    // 分类匹配
    for (var cat of matchedCategories) {
      if (ideaText.includes(cat)) {
        score += 5;
      }
    }
    
    // 优先级加权
    if (idea.high) score += 3;
    
    if (score > 0) {
      matched.push({ idea: idea, score: score });
    }
  }
  
  // 按分数排序，取前5
  matched.sort(function(a, b) { return b.score - a.score; });
  return matched.slice(0, 5).map(function(m) { return m.idea; });
}

function renderRecommendations(matchedIdeas) {
  var list = document.getElementById('recommend-list');
  
  if (matchedIdeas.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px;">暂无匹配创意，去「创意库」添加</div>';
    return;
  }
  
  list.innerHTML = matchedIdeas.map(function(idea) {
    var isSelected = selectedIdeas.some(function(s) { return s.id === idea.id; });
    return '<div class="recommend-item' + (isSelected ? ' selected' : '') + '" onclick="toggleIdeaSelection(\'' + idea.id + '\', this)">' +
      '<div class="recommend-check">' + (isSelected ? '✓' : '') + '</div>' +
      '<div class="recommend-info">' +
        '<div class="recommend-title">' + escapeHtml(idea.title) + '</div>' +
        '<div class="recommend-meta">' + idea.source + '</div>' +
      '</div>' +
      '<div class="recommend-priority">' + idea.priority + '</div>' +
    '</div>';
  }).join('');
}

function toggleIdeaSelection(id, el) {
  var idea = ideas.find(function(i) { return i.id === id; });
  if (!idea) return;
  
  var existingIndex = selectedIdeas.findIndex(function(s) { return s.id === id; });
  
  if (existingIndex >= 0) {
    // 取消选择
    selectedIdeas.splice(existingIndex, 1);
    el.classList.remove('selected');
    el.querySelector('.recommend-check').textContent = '';
  } else {
    // 最多选3个
    if (selectedIdeas.length >= 3) {
      showToast('最多选3个创意方向', true);
      return;
    }
    selectedIdeas.push(idea);
    el.classList.add('selected');
    el.querySelector('.recommend-check').textContent = '✓';
  }
  
  // 更新已选列表
  renderSelectedIdeas();
  updateStepState(2);
  updateWritePreview();
}

function renderSelectedIdeas() {
  var list = document.getElementById('selected-ideas-list');
  document.getElementById('selected-count').textContent = '已选 ' + selectedIdeas.length + ' 个';
  
  if (selectedIdeas.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px;">在上方选择或输入主题获取推荐</div>';
    return;
  }
  
  list.innerHTML = selectedIdeas.map(function(idea) {
    return '<div class="recommend-item selected" onclick="removeIdeaSelection(\'' + idea.id + '\')">' +
      '<div class="recommend-check">✓</div>' +
      '<div class="recommend-info">' +
        '<div class="recommend-title">' + escapeHtml(idea.title) + '</div>' +
        '<div class="recommend-meta">' + idea.priority + ' · 点击移除</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function removeIdeaSelection(id) {
  selectedIdeas = selectedIdeas.filter(function(s) { return s.id !== id; });
  renderSelectedIdeas();
  renderRecommendations(matchIdeas(currentTheme));
  updateStepState(2);
  updateWritePreview();
}

function updateWritePreview() {
  var title = document.getElementById('title-input').value.trim();
  var preview = document.getElementById('write-preview');
  var content = document.getElementById('write-preview-content');
  var meta = document.getElementById('write-preview-meta');
  var btn = document.getElementById('write-btn');
  
  // 生成命令
  var cmdTitle = title || (currentTheme ? '关于「' + currentTheme + '」的文章' : '');
  
  if (cmdTitle && selectedIdeas.length > 0) {
    // 构建完整命令
    var ideaRefs = selectedIdeas.map(function(i) { return 'IDEA-' + i.id; }).join(' + ');
    var ideaTitles = selectedIdeas.map(function(i) { return i.titles; }).join('\n');
    var ideaPoints = selectedIdeas.map(function(i) { return i.points; }).join('；');
    
    content.textContent = '/WRITING-CLONE ' + cmdTitle;
    meta.innerHTML = '📚 参考创意：' + ideaRefs + '<br>' +
      '💡 参考角度：' + ideaPoints;
    
    preview.style.display = 'block';
    btn.disabled = false;
    
    // 更新步骤状态
    updateStepState(3);
    updateStepState(4);
  } else if (cmdTitle) {
    content.textContent = '/WRITING-CLONE ' + cmdTitle;
    meta.textContent = '💡 无参考创意，可直接写作';
    preview.style.display = 'block';
    btn.disabled = false;
    updateStepState(3);
    updateStepState(4);
  } else {
    preview.style.display = 'none';
    btn.disabled = true;
  }
}

function updateStepState(step) {
  var stepEl = document.getElementById('step-' + ['theme', 'ideas', 'title', 'cmd'][step - 1]);
  if (stepEl) {
    stepEl.classList.add('active');
  }
}

function resetWriteFlow() {
  selectedIdeas = [];
  currentTheme = '';
  document.getElementById('theme-input').value = '';
  document.getElementById('title-input').value = '';
  document.getElementById('recommend-section').style.display = 'none';
  renderSelectedIdeas();
  document.getElementById('write-preview').style.display = 'none';
  document.getElementById('write-btn').disabled = true;
  
  // 重置步骤状态
  ['theme', 'ideas', 'title', 'cmd'].forEach(function(s) {
    document.getElementById('step-' + s).classList.remove('active', 'done');
  });
  document.getElementById('step-theme').classList.add('active');
}

function copyWriteCmd() {
  var title = document.getElementById('title-input').value.trim() || (currentTheme ? '关于「' + currentTheme + '」的文章' : '');
  
  if (!title) {
    showToast('请输入标题', true);
    return;
  }
  
  var fullCmd = '/WRITING-CLONE ' + title;
  
  // 如果有选中的创意，添加注释说明
  if (selectedIdeas.length > 0) {
    var ideaInfo = selectedIdeas.map(function(i) {
      return '【' + i.titles + '】' + i.points;
    }).join('\n');
    fullCmd = fullCmd + '\n\n参考创意：\n' + ideaInfo;
  }
  
  copyText(fullCmd);
  showToast('✓ 已复制！去 WorkBuddy 粘贴发送');
}

function useIdeaInWrite(id) {
  var idea = ideas.find(function(i) { return i.id === id; });
  if (!idea) return;
  
  // 切换到写作场景
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-scene="write"]').classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-write').classList.add('active');
  
  // 添加创意
  if (!selectedIdeas.some(function(s) { return s.id === id; })) {
    if (selectedIdeas.length >= 3) {
      selectedIdeas.shift(); // 移除第一个
    }
    selectedIdeas.push(idea);
  }
  
  // 填入标题
  document.getElementById('title-input').value = idea.titles.replace(/[「」]/g, '');
  
  // 更新UI
  renderSelectedIdeas();
  updateWritePreview();
  showToast('✓ 已添加创意方向');
}

function renderDraftsScene3() {
  var list = document.getElementById('draft-list-scene3');
  document.getElementById('stat-drafts').textContent = drafts.length;
  document.getElementById('draft-count-badge').textContent = drafts.length + ' 篇';

  if (drafts.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-text">暂无完稿</div><div class="empty-sub">从创意方向开始写第一篇</div></div>';
    return;
  }

  list.innerHTML = drafts.map(function(d) {
    var expanded = window['_draft_' + d.id] ? ' expanded' : '';
    return '<div class="draft-card' + expanded + '" id="draft-scene3-' + d.id + '">' +
      '<div class="draft-head" onclick="toggleDraftScene3(\'' + d.id + '\')">' +
        '<div class="draft-num">' + d.id + '</div>' +
        '<div class="draft-info">' +
          '<div class="draft-title">' + escapeHtml(d.title) + '</div>' +
          '<div class="draft-meta">方向 ' + d.idea + ' · ' + d.date + '</div>' +
        '</div>' +
        '<div class="draft-status">✓ ' + d.status + '</div>' +
        '<div class="draft-arrow">▼</div>' +
      '</div>' +
      '<div class="draft-detail">' +
        '<div class="draft-preview">' + d.preview + '</div>' +
        '<div class="draft-meta-detail">' + d.tags.map(function(t) { return '🏷 ' + t; }).join(' ') + '</div>' +
        '<div class="draft-actions">' +
          '<button class="draft-btn draft-btn-copy" onclick="copyDraftContent(\'' + d.id + '\')">📋 一键复制全文</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleDraftScene3(id) {
  var card = document.getElementById('draft-scene3-' + id);
  var isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.draft-card.expanded').forEach(function(c) { c.classList.remove('expanded'); });
  if (!isExpanded) {
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ══ 通用工具函数 ══
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(msg, isFail) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('fail', !!isFail);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function copyCmd(text) {
  copyText(text);
  showToast('✓ 已复制！');
}

function copyEntryCmd(id) {
  var entry = entries.find(function(e) { return e.id === id; });
  if (entry && entry.url) {
    copyText('/CONTENT-GOLDMINE\n' + entry.url);
    showToast('✓ 命令已复制');
  }
}

function copyIdeaDetails(id) {
  var idea = ideas.find(function(i) { return i.id === id; });
  if (!idea) return;
  var text = '【创意方向：IDEA-' + id + '】\n标题：' + idea.title + '\n角度：' + idea.angle + '\n论点：' + idea.points + '\n积木：' + idea.tags.join(' + ') + '\n参考：' + idea.source;
  copyText(text);
  showToast('✓ 详情已复制');
}

function copyDraftContent(draftId) {
  // 根据 draftId 查找完稿内容
  var draft = drafts.find(function(d) { return d.id === draftId; });
  if (!draft) {
    showToast('未找到完稿', true);
    return;
  }
  
  // 读取本地文件获取完整内容
  var filePath = 'material-library/drafts/draft-' + draftId + '-v1.md';
  fetch(filePath)
    .then(function(r) { return r.text(); })
    .then(function(content) {
      // 去掉 frontmatter 部分
      var cleanContent = content.replace(/^---[\s\S]*?---\n/, '');
      copyText(cleanContent);
      showToast('✓ 已复制全文，可直接粘贴到公众号');
    })
    .catch(function() {
      showToast('复制失败，请手动复制', true);
    });
}

// ══ 初始化 ══
function init() {
  // 渲染场景3的数据
  renderEntriesScene3();
  renderIdeasScene3();
  renderDraftsScene3();
  
  // 初始化已选创意列表
  renderSelectedIdeas();
  
  // 同步状态
  var syncBadge = document.getElementById('sync-badge');
  var syncTime = document.getElementById('sync-time');
  syncBadge.classList.add('ok');
  syncTime.textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
}

init();
</script>
