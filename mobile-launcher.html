<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写作飞轮</title>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151e;
    --card: #181c28;
    --card-hover: #1e2234;
    --border: #252a3a;
    --border-light: #2e3348;
    --accent: #7c6af7;
    --accent-light: #9580ff;
    --accent-glow: rgba(124, 106, 247, 0.2);
    --blue: #4da6ff;
    --blue-light: #70bbff;
    --gold: #f7c76a;
    --green: #6af7a5;
    --text: #e8eaf0;
    --text-secondary: #a0a8c0;
    --muted: #5c6280;
    --danger: #f76a6a;
    --success: #6af7a5;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
    overflow-x: hidden;
  }

  /* ── 顶部状态栏 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg) 80%, transparent 100%);
    padding: 16px 16px 24px;
  }
  .top-bar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #5e6af7);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(124,106,247,0.3);
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .sync-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--muted);
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .sync-badge.ok .sync-dot { background: var(--success); }
  .sync-badge.ok .sync-time { color: var(--success); }
  .sync-badge.fail .sync-dot { background: var(--danger); }
  .sync-badge.fail .sync-time { color: var(--danger); }

  /* ── 核心操作区 ── */
  .action-zone {
    padding: 0 16px 20px;
  }
  .action-tabs {
    display: flex;
    background: var(--card);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .action-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
    color: var(--muted);
    font-family: inherit;
  }
  .action-tab.active {
    background: var(--card-hover);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .action-tab-icon { font-size: 22px; line-height: 1; }
  .action-tab-name { font-size: 13px; font-weight: 600; }
  .action-tab-desc { font-size: 10px; opacity: 0.7; }

  /* 命令输入框 */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: border-color 0.2s;
  }
  .input-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .input-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .input-label-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .cmd-input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    min-height: 48px;
  }
  .cmd-input::placeholder { color: var(--muted); }
  .paste-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .paste-btn:active { transform: scale(0.95); opacity: 0.9; }

  /* 生成预览 */
  .cmd-preview {
    display: none;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 12px;
  }
  .cmd-preview.show { display: block; }
  .cmd-preview-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .cmd-preview-text {
    font-size: 13px;
    color: var(--blue-light);
    font-family: "SF Mono","Menlo",monospace;
    word-break: break-all;
    line-height: 1.6;
  }

  /* 主按钮 */
  .main-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #5e6af7);
    border: none;
    border-radius: var(--radius);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(124,106,247,0.3);
  }
  .main-btn:active { transform: scale(0.98); }
  .main-btn:disabled {
    background: var(--card-hover);
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--success);
    color: var(--success);
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.fail { border-color: var(--danger); color: var(--danger); }

  /* ── 统计数据 ── */
  .stats-row {
    display: flex;
    gap: 10px;
    padding: 0 16px 20px;
  }
  .stat-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stat-card:active { transform: scale(0.97); border-color: var(--border-light); }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-num.v1 { color: var(--accent); }
  .stat-num.v2 { color: var(--blue); }
  .stat-num.v3 { color: var(--gold); }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.3px;
  }

  /* ── 内容区块 ── */
  .section {
    padding: 0 16px 24px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-badge {
    font-size: 11px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    color: var(--muted);
    font-weight: 500;
  }
  .section-more {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .section-more:active { background: var(--card); color: var(--text); }

  /* ── 素材卡片 ── */
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .entry-card:active { transform: scale(0.99); }
  .entry-card.expanded { border-color: var(--border-light); }
  .entry-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    cursor: pointer;
  }
  .entry-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    font-family: monospace;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  .entry-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .entry-card.expanded .entry-arrow { transform: rotate(180deg); }

  /* 展开详情 */
  .entry-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0 14px;
    background: rgba(0,0,0,0.2);
  }
  .entry-card.expanded .entry-detail { display: block; }

  .entry-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .entry-section:last-child { border-bottom: none; }
  .entry-section-title {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .entry-structure {
    background: rgba(77, 166, 255, 0.08);
    border: 1px solid rgba(77, 166, 255, 0.2);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--blue-light);
    font-family: monospace;
    line-height: 1.5;
  }
  .entry-quotes { display: flex; flex-direction: column; gap: 6px; }
  .entry-quote {
    font-size: 12px;
    color: var(--gold);
    background: rgba(247, 199, 106, 0.06);
    border-left: 2px solid rgba(247, 199, 106, 0.4);
    padding: 6px 10px;
    border-radius: 0 6px 6px 0;
    line-height: 1.5;
  }
  .entry-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .entry-tag {
    font-size: 11px;
    background: var(--accent-glow);
    color: var(--accent-light);
    border: 1px solid rgba(124,106,247,0.2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* 操作按钮 */
  .entry-actions {
    display: flex;
    gap: 8px;
    padding: 12px 0;
  }
  .entry-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    background: none;
  }
  .entry-btn:active { transform: scale(0.96); }
  .entry-btn-copy {
    background: var(--accent-glow);
    border-color: rgba(124,106,247,0.3);
    color: var(--accent-light);
  }
  .entry-btn-link {
    background: rgba(77,166,255,0.1);
    border-color: rgba(77,166,255,0.3);
    color: var(--blue-light);
  }
  .entry-btn-link:active { background: rgba(77,166,255,0.2); }

  /* ── 创意方向 ── */
  .idea-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .idea-card.priority-high { border-color: rgba(247,106,106,0.3); }
  .idea-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    cursor: pointer;
  }
  .idea-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--blue);
    background: rgba(77,166,255,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    font-family: monospace;
  }
  .idea-priority {
    font-size: 10px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .idea-info { flex: 1; min-width: 0; }
  .idea-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .idea-source {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .idea-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .idea-card.expanded .idea-arrow { transform: rotate(180deg); }

  .idea-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0 14px;
    background: rgba(0,0,0,0.15);
  }
  .idea-card.expanded .idea-detail { display: block; }
  .idea-angle {
    background: rgba(77,166,255,0.07);
    border: 1px solid rgba(77,166,255,0.15);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    color: var(--blue-light);
    line-height: 1.6;
    margin: 12px 0;
  }
  .idea-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .idea-row:last-child { border-bottom: none; }
  .idea-row-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .idea-row-value {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }
  .idea-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .idea-tag {
    font-size: 11px;
    background: rgba(124,106,247,0.08);
    color: var(--accent-light);
    border: 1px solid rgba(124,106,247,0.2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .idea-actions {
    display: flex;
    gap: 8px;
    padding: 12px 0;
  }
  .idea-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    background: none;
  }
  .idea-btn:active { transform: scale(0.96); }
  .idea-btn-write {
    background: rgba(106,247,165,0.1);
    border-color: rgba(106,247,165,0.3);
    color: var(--success);
  }
  .idea-btn-copy {
    background: rgba(124,106,247,0.08);
    border-color: rgba(124,106,247,0.25);
    color: var(--accent-light);
  }

  /* ── 完稿卡片 ── */
  .draft-card {
    background: var(--card);
    border: 1px solid rgba(247,199,106,0.25);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .draft-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    cursor: pointer;
  }
  .draft-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    background: rgba(247,199,106,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    font-family: monospace;
  }
  .draft-info { flex: 1; min-width: 0; }
  .draft-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .draft-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  .draft-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .draft-card.expanded .draft-arrow { transform: rotate(180deg); }
  .draft-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(106,247,165,0.1);
    color: var(--success);
    border: 1px solid rgba(106,247,165,0.2);
    flex-shrink: 0;
  }
  .draft-detail {
    display: none;
    border-top: 1px solid rgba(247,199,106,0.15);
    padding: 14px;
    background: rgba(0,0,0,0.2);
  }
  .draft-card.expanded .draft-detail { display: block; }
  .draft-preview {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .draft-preview strong { color: var(--text); }
  .draft-meta-detail {
    display: flex;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── 快捷操作 ── */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 0 16px 24px;
  }
  .quick-btn {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-btn:active { transform: scale(0.96); background: var(--card-hover); }
  .quick-icon { font-size: 20px; }
  .quick-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

  /* ── 空状态 ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; }
  .empty-sub { font-size: 12px; margin-top: 6px; opacity: 0.7; }

  /* ── 删除确认 ── */
  .delete-confirm {
    display: none;
    background: rgba(247,106,106,0.05);
    border-top: 1px solid rgba(247,106,106,0.2);
    padding: 12px 14px;
  }
  .delete-confirm.show { display: block; }
  .delete-confirm-text {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .delete-btns { display: flex; gap: 8px; }
  .delete-confirm-btn {
    flex: 1;
    padding: 9px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .delete-confirm-btn:active { transform: scale(0.96); }
  .delete-confirm-btn.ok { background: var(--danger); color: white; }
  .delete-confirm-btn.cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

  /* 动画 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.3s ease; }

  /* 流程图 */
  .flow-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    gap: 0;
    margin-bottom: 8px;
  }
  .flow-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .flow-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .flow-step:nth-child(1) .flow-icon { background: var(--accent-glow); }
  .flow-step:nth-child(3) .flow-icon { background: rgba(77,166,255,0.15); }
  .flow-step:nth-child(5) .flow-icon { background: rgba(247,199,106,0.15); }
  .flow-step:nth-child(7) .flow-icon { background: rgba(106,247,165,0.15); }
  .flow-label { font-size: 10px; color: var(--muted); text-align: center; }

// ══ Tab 切换 ══
function switchTab(btn) {
  document.querySelectorAll('.action-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  var config = cmdConfig[currentTab];
  document.getElementById('input-hint').textContent = config.hint;
  document.getElementById('cmd-input').placeholder = config.hint;
  document.getElementById('btn-icon').textContent = config.btnIcon;
  document.getElementById('btn-text').textContent = config.btnText;
  document.getElementById('cmd-input').value = '';
  document.getElementById('cmd-preview').classList.remove('show');
  document.getElementById('main-btn').disabled = true;
}

// ══ 输入处理 ══
function onInput() {
  var val = document.getElementById('cmd-input').value.trim();
  var preview = document.getElementById('cmd-preview');
  var previewText = document.getElementById('cmd-preview-text');
  var btn = document.getElementById('main-btn');

  if (val) {
    var config = cmdConfig[currentTab];
    previewText.textContent = config.prefix + val;
    preview.classList.add('show');
    btn.disabled = false;
  } else {
    preview.classList.remove('show');
    btn.disabled = true;
  }
}

// ══ 粘贴 ══
function doPaste() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(function(text) {
      document.getElementById('cmd-input').value = text;
      onInput();
    }).catch(function() {
      showToast('请长按输入框选择「粘贴」', true);
    });
  } else {
    showToast('请长按输入框选择「粘贴」', true);
  }
}

// ══ 执行 ══
function doExecute() {
  var val = document.getElementById('cmd-input').value.trim();
  if (!val) return;
  var config = cmdConfig[currentTab];
  var fullCmd = config.prefix + val;
  copyText(fullCmd);
  showToast(config.toast);
}

// ══ 复制任意命令 ══
function copyCmd(text) {
  copyText(text);
  showToast('✓ 已复制！');
}

// ══ 通用工具 ══
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(msg, isFail) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('fail', !!isFail);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ══ 渲染素材库 ══
function renderEntries() {
  var list = document.getElementById('entry-list');
  document.getElementById('stat-entries').textContent = entries.length;
  document.getElementById('entry-count').textContent = entries.length + ' 条';

  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">素材库为空</div><div class="empty-sub">使用「拆解入库」添加第一个素材</div></div>';
    return;
  }

  list.innerHTML = entries.map(function(e) {
    var expanded = window['_entry_' + e.id] ? ' expanded' : '';
    return '<div class="entry-card' + expanded + '" id="entry-' + e.id + '">' +
      '<div class="entry-head" onclick="toggleEntry(\'' + e.id + '\')">' +
        '<div class="entry-num">' + e.id + '</div>' +
        '<div class="entry-info">' +
          '<div class="entry-title">' + escapeHtml(e.title) + '</div>' +
          '<div class="entry-meta">' + e.source + ' · ' + e.date + '</div>' +
        '</div>' +
        '<div class="entry-arrow">▼</div>' +
      '</div>' +
      '<div class="entry-detail">' +
        (e.url ? '<div class="entry-section"><div class="entry-section-title">原文链接</div><a href="' + e.url + '" target="_blank" class="entry-structure" style="display:block;text-decoration:none;">' + escapeHtml(e.url.substring(0,50)) + '...</a></div>' : '') +
        '<div class="entry-section"><div class="entry-section-title">核心结构</div><div class="entry-structure">' + escapeHtml(e.structure) + '</div></div>' +
        '<div class="entry-section"><div class="entry-section-title">精选金句</div><div class="entry-quotes">' + e.quotes.map(function(q) { return '<div class="entry-quote">' + escapeHtml(q) + '</div>'; }).join('') + '</div></div>' +
        '<div class="entry-section"><div class="entry-section-title">创意积木</div><div class="entry-tags">' + e.tags.map(function(t) { return '<span class="entry-tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div></div>' +
        '<div class="entry-actions">' +
          '<button class="entry-btn entry-btn-copy" onclick="copyEntryCmd(\'' + e.id + '\')">📋 复制命令</button>' +
          (e.url ? '<a class="entry-btn entry-btn-link" href="' + e.url + '" target="_blank">🔗 原文</a>' : '') +
        '</div>' +
        '<div class="delete-confirm" id="dc-' + e.id + '">' +
          '<div class="delete-confirm-text">页面删除仅为隐藏，实际文件仍在 WorkBuddy 素材库中。</div>' +
          '<div class="delete-btns"><button class="delete-confirm-btn ok" onclick="doDelete(\'' + e.id + '\')">确认</button><button class="delete-confirm-btn cancel" onclick="cancelDelete(\'' + e.id + '\')">取消</button></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleEntry(id) {
  var card = document.getElementById('entry-' + id);
  var isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.entry-card.expanded').forEach(function(c) {
    c.classList.remove('expanded');
    c.querySelectorAll('.delete-confirm').forEach(function(d) { d.classList.remove('show'); });
  });
  if (!isExpanded) {
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function copyEntryCmd(id) {
  var entry = entries.find(function(e) { return e.id === id; });
  if (entry && entry.url) {
    copyText('/CONTENT-GOLDMINE\n' + entry.url);
    showToast('✓ 命令已复制');
  }
}

function cancelDelete(id) {
  document.getElementById('dc-' + id).classList.remove('show');
}

// ══ 渲染创意方向 ══
function renderIdeas() {
  var list = document.getElementById('idea-list');
  document.getElementById('stat-ideas').textContent = ideas.length;
  document.getElementById('idea-count-badge').textContent = ideas.length + ' 条';

  if (ideas.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">💡</div><div class="empty-text">暂无创意方向</div><div class="empty-sub">先添加素材，再用 IDEA-GEN 生成</div></div>';
    return;
  }

  // 按优先级排序
  var sorted = ideas.slice().sort(function(a, b) {
    return b.priority.localeCompare(a.priority);
  });

  list.innerHTML = sorted.map(function(item) {
    var expanded = window['_idea_' + item.id] ? ' expanded' : '';
    var highClass = item.high ? ' priority-high' : '';
    return '<div class="idea-card' + expanded + highClass + '" id="idea-' + item.id + '">' +
      '<div class="idea-head" onclick="toggleIdea(\'' + item.id + '\')">' +
        '<div class="idea-num">IDEA-' + item.id + '</div>' +
        '<div class="idea-priority">' + item.priority + '</div>' +
        '<div class="idea-info">' +
          '<div class="idea-title">' + escapeHtml(item.title) + '</div>' +
          '<div class="idea-source">来自：' + item.source + '</div>' +
        '</div>' +
        '<div class="idea-arrow">▼</div>' +
      '</div>' +
      '<div class="idea-detail">' +
        '<div class="idea-angle">' + escapeHtml(item.angle) + '</div>' +
        '<div class="idea-row"><div class="idea-row-label">推荐标题</div><div class="idea-row-value" style="color:var(--gold)">' + escapeHtml(item.titles) + '</div></div>' +
        '<div class="idea-row"><div class="idea-row-label">目标读者</div><div class="idea-row-value">' + escapeHtml(item.target) + '</div></div>' +
        '<div class="idea-row"><div class="idea-row-label">核心论点</div><div class="idea-row-value">' + escapeHtml(item.points) + '</div></div>' +
        '<div class="idea-row"><div class="idea-row-label">创意积木</div><div class="idea-tags">' + item.tags.map(function(t) { return '<span class="idea-tag">' + escapeHtml(t) + '</span>'; }).join('') + '</div></div>' +
        '<div class="idea-actions">' +
          '<button class="idea-btn idea-btn-write" onclick="copyWriteCmd(\'' + item.id + '\')">✍️ 直接写稿</button>' +
          '<button class="idea-btn idea-btn-copy" onclick="copyIdeaDetails(\'' + item.id + '\')">📋 复制详情</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleIdea(id) {
  var card = document.getElementById('idea-' + id);
  var isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.idea-card.expanded').forEach(function(c) { c.classList.remove('expanded'); });
  if (!isExpanded) {
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function copyWriteCmd(id) {
  var idea = ideas.find(function(i) { return i.id === id; });
  if (idea) {
    copyText('/WRITING-CLONE ' + idea.title);
    showToast('✓ 写作命令已复制！去 WorkBuddy');
  }
}

function copyIdeaDetails(id) {
  var idea = ideas.find(function(i) { return i.id === id; });
  if (!idea) return;
  var text = '【创意方向：IDEA-' + id + '】\n标题：' + idea.title + '\n角度：' + idea.angle + '\n论点：' + idea.points + '\n积木：' + idea.tags.join(' + ') + '\n参考：' + idea.source;
  copyText(text);
  showToast('✓ 详情已复制');
}

// ══ 渲染完稿 ══
function renderDrafts() {
  var list = document.getElementById('draft-list');
  document.getElementById('stat-drafts').textContent = drafts.length;
  document.getElementById('draft-count-badge').textContent = drafts.length + ' 篇';

  if (drafts.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-text">暂无完稿</div><div class="empty-sub">从创意方向开始写第一篇</div></div>';
    return;
  }

  list.innerHTML = drafts.map(function(d) {
    var expanded = window['_draft_' + d.id] ? ' expanded' : '';
    return '<div class="draft-card' + expanded + '" id="draft-' + d.id + '">' +
      '<div class="draft-head" onclick="toggleDraft(\'' + d.id + '\')">' +
        '<div class="draft-num">' + d.id + '</div>' +
        '<div class="draft-info">' +
          '<div class="draft-title">' + escapeHtml(d.title) + '</div>' +
          '<div class="draft-meta">方向 ' + d.idea + ' · ' + d.date + '</div>' +
        '</div>' +
        '<div class="draft-status">✓ ' + d.status + '</div>' +
        '<div class="draft-arrow">▼</div>' +
      '</div>' +
      '<div class="draft-detail">' +
        '<div class="draft-preview">' + d.preview + '</div>' +
        '<div class="draft-meta-detail">' + d.tags.map(function(t) { return '🏷 ' + t; }).join(' ') + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleDraft(id) {
  var card = document.getElementById('draft-' + id);
  var isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.draft-card.expanded').forEach(function(c) { c.classList.remove('expanded'); });
  if (!isExpanded) {
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ══ 初始化 ══
renderEntries();
renderIdeas();
renderDrafts();

var syncTime = document.getElementById('sync-time');
syncBadge.classList.add('ok');
syncTime.textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
</script>
