<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞书助手 - 素材库管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 { font-size: 20px; margin-bottom: 4px; }
        .header p { font-size: 12px; opacity: 0.8; }
        
        .scene-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .scene-card {
            background: white;
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .scene-card:active { transform: scale(0.98); }
        .scene-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        .scene-card.scene1::before { background: linear-gradient(90deg, #667eea, #764ba2); }
        .scene-card.scene2::before { background: linear-gradient(90deg, #f093fb, #f5576c); }
        
        .scene-icon { font-size: 32px; margin-bottom: 8px; }
        .scene-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .scene-desc { font-size: 11px; color: #999; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn:last-child { margin-bottom: 0; }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f0f0f5; color: #333; }
        .btn-pink { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        
        .record-list { max-height: 300px; overflow-y: auto; }
        .record-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f5;
            cursor: pointer;
            transition: background 0.2s;
        }
        .record-item:last-child { border-bottom: none; }
        .record-item:active { background: #f5f5f7; }
        .record-num { font-size: 12px; color: #667eea; font-weight: 600; }
        .record-title { font-size: 14px; color: #333; margin-top: 4px; line-height: 1.4; }
        .record-date { font-size: 11px; color: #bbb; margin-top: 4px; }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            border-top: 1px solid #eee;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 50;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: #999;
            cursor: pointer;
        }
        .tab-item.active { color: #667eea; }
        .tab-item span { display: block; font-size: 20px; margin-bottom: 2px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: flex-end;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            width: 100%;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-close {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }
        
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            background: white;
        }
        .input-group textarea { height: 80px; }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            display: none;
        }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } }
        
        .empty {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        .empty span { font-size: 36px; display: block; margin-bottom: 8px; }
        
        .scene-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .scene-badge.s1 { background: #eef2ff; color: #667eea; }
        .scene-badge.s2 { background: #fff0f3; color: #f5576c; }
        
        .detail-section { margin-bottom: 16px; }
        .detail-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .detail-content { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        
        .loading { text-align: center; padding: 30px; color: #999; }
        
        .quick-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .quick-add-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .quick-add-desc { font-size: 12px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 飞书助手</h1>
        <p>素材库管理</p>
    </div>
    
    <!-- 场景选择 -->
    <div class="scene-cards">
        <div class="scene-card scene1" onclick="showAddModal('scene1')">
            <div class="scene-icon">🔥</div>
            <div class="scene-title">爆款延伸</div>
            <div class="scene-desc">场景1 · 延伸写作</div>
        </div>
        <div class="scene-card scene2" onclick="showAddModal('scene2')">
            <div class="scene-icon">✍️</div>
            <div class="scene-title">原创首发</div>
            <div class="scene-desc">场景2 · 创意写作</div>
        </div>
    </div>
    
    <!-- 最近素材 -->
    <div class="card">
        <div class="card-title">📚 素材库 <span id="count" style="font-weight:normal;color:#999;font-size:12px;"></span></div>
        <div id="list" class="loading">加载中...</div>
    </div>
    
    <!-- 快捷操作 -->
    <div class="card">
        <div class="card-title">⚡ 快捷操作</div>
        <button class="btn btn-secondary" onclick="openGuide()">📖 使用指南</button>
        <button class="btn btn-secondary" onclick="openBitable()">📋 飞书表格</button>
    </div>
    
    <!-- Tab Bar -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('home', this)">
            <span>🏠</span>
            首页
        </div>
        <div class="tab-item" onclick="switchTab('ideas', this)">
            <span>💡</span>
            创意库
        </div>
        <div class="tab-item" onclick="switchTab('drafts', this)">
            <span>✏️</span>
            完稿
        </div>
    </div>
    
    <!-- 添加素材弹窗 -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="addModalTitle">➕ 添加素材</div>
            <div class="modal-close" onclick="closeModal('addModal')">×</div>
            
            <input type="hidden" id="addScene" value="scene1">
            
            <div class="input-group">
                <label>场景</label>
                <select id="sceneSelect" onchange="document.getElementById('addScene').value = this.value">
                    <option value="scene1">🔥 场景1：爆款延伸写作</option>
                    <option value="scene2">✍️ 场景2：原创首发写作</option>
                </select>
            </div>
            <div class="input-group">
                <label>标题 *</label>
                <input type="text" id="addTitle" placeholder="输入文章标题">
            </div>
            <div class="input-group">
                <label>来源链接</label>
                <input type="text" id="addLink" placeholder="微信公众号链接">
            </div>
            <div class="input-group">
                <label>拆解结构</label>
                <textarea id="addStructure" placeholder="文章结构拆解..."></textarea>
            </div>
            <div class="input-group">
                <label>金句</label>
                <input type="text" id="addHighlight" placeholder="触动读者的金句">
            </div>
            <div class="input-group">
                <label>创意方向</label>
                <textarea id="addDirection" placeholder="可延伸的写作方向..."></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="submitMaterial()">✅ 确认添加</button>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal('detailModal')">×</div>
            <div id="detailInner"></div>
        </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="toast"></div>
    
    <script>
        const APP_ID = 'cli_a9492e187b789bdd';
        const APP_SECRET = 'EPZT2dEYrNBCzrHKVacmJxEkhzZzRdYs';
        const BASE_TOKEN = 'NKblbp9RzavdLYsMaHucFM1fnYm';
        
        // 子表 ID
        const TABLES = {
            materials: 'tblbia5WvpLjxjMA',
            ideas: 'tblHNBaMJcLULg9G',
            scene1: 'tbl82yANJT7w1mib',
            scene2: 'tbly6Zxiizq1Q0Z4'
        };
        
        let currentTab = 'home';
        let materials = [];
        let ideas = [];
        let token = null;
        let tokenExpire = 0;
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        async function getToken() {
            if (token && Date.now() < tokenExpire) return token;
            try {
                const resp = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ app_id: APP_ID, app_secret: APP_SECRET })
                });
                const data = await resp.json();
                token = data.tenant_access_token;
                tokenExpire = Date.now() + 7000 * 1000;
                return token;
            } catch (e) { return null; }
        }
        
        async function loadMaterials() {
            const list = document.getElementById('list');
            list.innerHTML = '<div class="loading">加载中...</div>';
            
            const t = await getToken();
            if (!t) { list.innerHTML = '<div class="empty"><span>⚠️</span>加载失败</div>'; return; }
            
            try {
                const resp = await fetch(
                    `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_TOKEN}/tables/${TABLES.materials}/records?page_size=100`,
                    { headers: { 'Authorization': 'Bearer ' + t } }
                );
                const data = await resp.json();
                
                if (data.code === 0) {
                    materials = data.data.items;
                    document.getElementById('count').textContent = `(${materials.length}条)`;
                    renderMaterials();
                } else {
                    list.innerHTML = '<div class="empty"><span>⚠️</span>加载失败</div>';
                }
            } catch (e) { list.innerHTML = '<div class="empty"><span>⚠️</span>网络错误</div>'; }
        }
        
        function renderMaterials() {
            const list = document.getElementById('list');
            if (materials.length === 0) {
                list.innerHTML = '<div class="empty"><span>📭</span>暂无素材</div>';
                return;
            }
            
            let html = '<div class="record-list">';
            materials.forEach((r, i) => {
                const f = r.fields;
                const num = f['编号'] || '-';
                const title = f['标题'] || '-';
                const type = f['单选'] || '';
                
                html += `
                    <div class="record-item" onclick="showDetail(${i})">
                        <div class="record-num">${num} ${type ? `<span class="scene-badge s1">${type}</span>` : ''}</div>
                        <div class="record-title">${title}</div>
                    </div>
                `;
            });
            html += '</div>';
            list.innerHTML = html;
        }
        
        function showDetail(index) {
            const r = materials[index];
            const f = r.fields;
            
            document.getElementById('detailInner').innerHTML = `
                <div class="modal-title">${f['编号'] || '-'}</div>
                <h3 style="margin-bottom:16px;">${f['标题'] || '-'}</h3>
                
                ${f['来源链接'] ? `
                <div class="detail-section">
                    <div class="detail-label">来源链接</div>
                    <div class="detail-content"><a href="${f['来源链接'].link || f['来源链接']}" target="_blank" style="color:#667eea;">🔗 ${f['来源链接'].text || f['来源链接'].link || f['来源链接']}</a></div>
                </div>
                ` : ''}
                
                ${f['拆解结构'] ? `
                <div class="detail-section">
                    <div class="detail-label">拆解结构</div>
                    <div class="detail-content">${f['拆解结构']}</div>
                </div>
                ` : ''}
                
                ${f['金句'] ? `
                <div class="detail-section">
                    <div class="detail-label">金句</div>
                    <div class="detail-content" style="color:#667eea;font-style:italic;">"${f['金句']}"</div>
                </div>
                ` : ''}
                
                ${f['创意方向'] ? `
                <div class="detail-section">
                    <div class="detail-label">创意方向</div>
                    <div class="detail-content">${f['创意方向']}</div>
                </div>
                ` : ''}
            `;
            
            document.getElementById('detailModal').classList.add('show');
        }
        
        function showAddModal(scene) {
            document.getElementById('addScene').value = scene || 'scene1';
            document.getElementById('sceneSelect').value = scene || 'scene1';
            document.getElementById('addTitle').value = '';
            document.getElementById('addLink').value = '';
            document.getElementById('addStructure').value = '';
            document.getElementById('addHighlight').value = '';
            document.getElementById('addDirection').value = '';
            document.getElementById('addModal').classList.add('show');
        }
        
        async function submitMaterial() {
            const title = document.getElementById('addTitle').value.trim();
            if (!title) { showToast('请输入标题'); return; }
            
            showToast('添加功能开发中...');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }
        
        function switchTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            if (tab === 'ideas') {
                document.getElementById('list').innerHTML = '<div class="empty"><span>💡</span>创意方向库<br><small style="color:#999;">暂无数据</small></div>';
            } else if (tab === 'drafts') {
                document.getElementById('list').innerHTML = '<div class="empty"><span>✏️</span>完稿库<br><small style="color:#999;">暂无数据</small></div>';
            } else {
                loadMaterials();
            }
        }
        
        function openGuide() { window.open('https://zjs6667788.github.io/writing-flywheel-v1/guide.html', '_blank'); }
        function openBitable() { window.open('https://fcn21p9cn411.feishu.cn/base/NKblbp9RzavdLYsMaHucFM1fnYm', '_blank'); }
        
        // 初始化
        loadMaterials();
    </script>
</body>
</html>
